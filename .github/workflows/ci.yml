name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GoNexus
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: GoNexus/go.mod
          cache-dependency-path: GoNexus/go.sum

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -trimpath -o /tmp/gonexus .

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GoNexus/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: GoNexus/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: GoNexus
          file: GoNexus/Dockerfile
          push: false
          tags: gonexus-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: GoNexus/frontend
          file: GoNexus/frontend/Dockerfile
          push: false
          tags: gonexus-frontend:ci
